<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PixiStudio</title>
    <script src="https://pixijs.download/v7.4.0/pixi.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --accent: #ff9100;
        --bg-dark: #121212;
        --panel-bg: #1e1e1e;
        --border: #333333;
        --text: #e0e0e0;
        --hover: #2a2a2a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #0a0a0a;
        color: var(--text);
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* ===== HEADER ===== */
      header {
        height: 50px;
        background: var(--panel-bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 20px;
        justify-content: space-between;
        z-index: 100;
      }

      .logo {
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--accent);
        font-size: 1.1rem;
      }

      /* ===== MAIN LAYOUT ===== */
      #editor-container {
        display: flex;
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      /* ===== TOOLBAR (Left) ===== */
      #toolbar {
        width: 60px;
        background: var(--panel-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 15px 0;
        gap: 15px;
      }

      .tool-btn {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: #888;
        cursor: pointer;
        transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }

      .tool-btn:hover {
        background: var(--hover);
        color: white;
      }
      .tool-btn.active {
        background: var(--accent);
        color: white;
        box-shadow: 0 4px 15px rgba(255, 145, 0, 0.3);
      }

      /* ===== CANVAS AREA ===== */
      #viewport {
        flex: 1;
        position: relative;
        background-image:
          linear-gradient(45deg, #181818 25%, transparent 25%),
          linear-gradient(-45deg, #181818 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #181818 75%),
          linear-gradient(-45deg, transparent 75%, #181818 75%);
        background-size: 20px 20px;
        background-position:
          0 0,
          0 10px,
          10px -10px,
          -10px 0px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: auto;
      }

      /* ===== PROPERTIES PANEL (Right) ===== */
      #right-panel {
        width: 260px;
        background: var(--panel-bg);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }

      .panel-section {
        padding: 20px;
        border-bottom: 1px solid var(--border);
      }

      .panel-title {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #666;
        margin-bottom: 15px;
        display: block;
      }

      /* Input Styling */
      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
        background: #333;
        height: 4px;
        border-radius: 2px;
        appearance: none;
      }

      .btn-primary {
        background: var(--accent);
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: opacity 0.2s;
      }

      .btn-primary:hover {
        opacity: 0.9;
      }

      #layersList {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
      }

      .layer-item {
        background: #252525;
        border-radius: 6px;
        padding: 8px;
        margin-bottom: 8px;
        border: 1px solid transparent;
        transition: 0.2s;
      }

      .layer-item:hover {
        border-color: var(--accent);
      }

      .layer-preview {
        width: 100%;
        height: 60px;
        background: #000;
        border-radius: 4px;
        object-fit: contain;
        margin-bottom: 8px;
      }

      .layer-actions {
        display: flex;
        justify-content: space-between;
        gap: 5px;
      }

      .layer-btn {
        flex: 1;
        background: #333;
        border: none;
        color: #aaa;
        padding: 4px;
        font-size: 11px;
        border-radius: 4px;
        cursor: pointer;
      }

      .layer-btn:hover {
        background: #444;
        color: white;
      }

      #upload-label {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        color: var(--text);
        font-size: 14px;
      }

      /* Utility */
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">PIXIM</div>
      <div class="header-actions">
        <label id="upload-label">
          <i
            class="fa-solid fa-cloud-arrow-up"
            style="color: var(--accent)"
          ></i>
          Import
          <input type="file" id="upload" class="hidden" />
        </label>
      </div>
    </header>

    <div id="editor-container">
      <nav id="toolbar">
        <button id="lassoMode" class="tool-btn active" title="Lasso Tool (L)">
          <i class="fa-solid fa-bezier-curve"></i>
        </button>
        <button id="brushMode" class="tool-btn" title="Eraser Brush (B)">
          <i class="fa-solid fa-eraser"></i>
        </button>
      </nav>

      <main id="viewport"></main>

      <aside id="right-panel">
        <div class="panel-section">
          <span class="panel-title">Tool Properties</span>
          <div
            style="
              display: flex;
              justify-content: space-between;
              margin-bottom: 8px;
            "
          >
            <label style="font-size: 13px">Brush Size</label>
            <span id="sizeValue" style="color: var(--accent); font-weight: bold"
              >30</span
            >
          </div>
          <input type="range" id="brushSize" min="5" max="150" value="30" />
        </div>

        <div
          class="panel-section"
          style="flex: 1; display: flex; flex-direction: column"
        >
          <span class="panel-title">Layers</span>
          <div id="layersList"></div>
        </div>

        <div class="panel-section">
          <button id="save" class="btn-primary">
            <i class="fa-solid fa-download"></i> Export Final
          </button>
        </div>
      </aside>
    </div>

    <script>
      // Initialize Pixi with modern settings
      const app = new PIXI.Application({
        backgroundAlpha: 0,
        antialias: true,
        resolution: window.devicePixelRatio || 1,
        autoDensity: true,
      });

      document.getElementById("viewport").appendChild(app.view);

      // ================= STATE =================
      let drawingTexture, drawingSprite;
      let mode = "lasso";
      let brushSize = 30;
      let lassoPoints = [];
      let draggingPoint = -1;
      let layers = [];
      let isDrawing = false;

      // ================= UI CONTROLS =================
      const buttons = {
        lasso: document.getElementById("lassoMode"),
        brush: document.getElementById("brushMode"),
      };

      function setMode(newMode) {
        mode = newMode;
        Object.values(buttons).forEach((b) => b.classList.remove("active"));
        buttons[newMode].classList.add("active");
        lassoPoints = [];
        lassoGraphics.clear();
      }

      buttons.lasso.onclick = () => setMode("lasso");
      buttons.brush.onclick = () => setMode("brush");

      const sizeSlider = document.getElementById("brushSize");
      const sizeLabel = document.getElementById("sizeValue");

      sizeSlider.oninput = (e) => {
        brushSize = parseInt(e.target.value);
        sizeLabel.innerText = brushSize;
      };

      // ================= GRAPHICS =================
      const lassoGraphics = new PIXI.Graphics();
      app.stage.addChild(lassoGraphics);

      function drawLasso(mousePos = null) {
        lassoGraphics.clear();
        if (lassoPoints.length === 0) return;

        // Line style: Accent color for the path
        lassoGraphics.lineStyle(2, 0xff9100, 1);
        lassoGraphics.moveTo(lassoPoints[0].x, lassoPoints[0].y);

        for (let i = 1; i < lassoPoints.length; i++) {
          lassoGraphics.lineTo(lassoPoints[i].x, lassoPoints[i].y);
        }

        if (mousePos && mode === "lasso") {
          lassoGraphics.lineTo(mousePos.x, mousePos.y);
        }

        lassoPoints.forEach((p, i) => {
          lassoGraphics.beginFill(i === 0 ? 0xffffff : 0xff9100);
          lassoGraphics.drawCircle(p.x, p.y, 5);
          lassoGraphics.endFill();
        });
      }

      // ================= UPLOAD =================
      document.getElementById("upload").onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.onload = () => {
          app.renderer.resize(img.width, img.height);

          drawingTexture = PIXI.RenderTexture.create({
            width: img.width,
            height: img.height,
          });

          const tempSprite = PIXI.Sprite.from(img);
          app.renderer.render(tempSprite, { renderTexture: drawingTexture });

          if (drawingSprite) app.stage.removeChild(drawingSprite);
          drawingSprite = new PIXI.Sprite(drawingTexture);
          app.stage.addChildAt(drawingSprite, 0);

          enableEvents();
        };
        img.src = URL.createObjectURL(file);
      };

      // ================= EVENTS =================
      function enableEvents() {
        app.stage.eventMode = "static";
        app.stage.hitArea = app.screen;

        app.stage.on("pointerdown", (e) => {
          const pos = e.global.clone();
          if (mode === "lasso") {
            if (lassoPoints.length > 2) {
              const distToStart = Math.hypot(
                pos.x - lassoPoints[0].x,
                pos.y - lassoPoints[0].y,
              );
              if (distToStart < 20) {
                applyLasso();
                return;
              }
            }
            lassoPoints.push(pos);
            drawLasso();
          } else {
            isDrawing = true;
          }
        });

        app.stage.on("pointermove", (e) => {
          const pos = e.global;
          if (mode === "lasso") {
            drawLasso(pos);
          } else if (isDrawing && mode === "brush") {
            const g = new PIXI.Graphics();
            g.beginFill(0xffffff);
            g.drawCircle(pos.x, pos.y, brushSize);
            g.endFill();
            g.blendMode = PIXI.BLEND_MODES.DST_OUT;
            app.renderer.render(g, {
              renderTexture: drawingTexture,
              clear: false,
            });
          }
        });

        app.stage.on("pointerup", () => (isDrawing = false));
      }

      function applyLasso() {
        const mask = new PIXI.Graphics();
        mask.beginFill(0xffffff);
        mask.moveTo(lassoPoints[0].x, lassoPoints[0].y);
        lassoPoints.forEach((p) => mask.lineTo(p.x, p.y));
        mask.closePath();

        const tex = PIXI.RenderTexture.create({
          width: app.screen.width,
          height: app.screen.height,
        });
        const container = new PIXI.Container();
        const spriteCopy = new PIXI.Sprite(drawingTexture);
        container.addChild(spriteCopy);
        container.mask = mask;
        container.addChild(mask);

        app.renderer.render(container, { renderTexture: tex });
        const newLayerSprite = new PIXI.Sprite(tex);
        app.stage.addChild(newLayerSprite);

        layers.push({ texture: tex, sprite: newLayerSprite });
        lassoPoints = [];
        lassoGraphics.clear();
        updateLayers();
      }

      function updateLayers() {
        const list = document.getElementById("layersList");
        list.innerHTML = "";

        layers.forEach((l, i) => {
          const div = document.createElement("div");
          div.className = "layer-item";

          const canvas = app.renderer.extract.canvas(l.texture);

          div.innerHTML = `
            <img class="layer-preview" src="${canvas.toDataURL()}">
            <div style="font-size: 12px; margin-bottom: 5px;">Layer ${i + 1}</div>
            <div class="layer-actions">
                <button class="layer-btn" onclick="downloadLayer(${i})"><i class="fa-solid fa-download"></i></button>
                <button class="layer-btn" onclick="deleteLayer(${i})" style="color:#ff4444"><i class="fa-solid fa-trash"></i></button>
            </div>
          `;
          list.appendChild(div);
        });
      }

      window.deleteLayer = (i) => {
        app.stage.removeChild(layers[i].sprite);
        layers.splice(i, 1);
        updateLayers();
      };

      window.downloadLayer = (i) => {
        const canvas = app.renderer.extract.canvas(layers[i].texture);
        const a = document.createElement("a");
        a.href = canvas.toDataURL();
        a.download = `layer-${i + 1}.png`;
        a.click();
      };

      document.getElementById("save").onclick = () => {
        const canvas = app.renderer.extract.canvas(app.stage);
        const a = document.createElement("a");
        a.href = canvas.toDataURL("image/png");
        a.download = "pixistudio-export.png";
        a.click();
      };
    </script>
  </body>
</html>
